name: hawkins-cms-dev

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8080:80"
    environment:
      APP_NAME: "Hawkins CMS"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ""
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: hawkins_cms
      DB_USERNAME: hawkins
      DB_PASSWORD: hawkins_dev_pass
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FILESYSTEM_DISK: local
      TENANCY_DB_BOOTSTRAPPER: ""
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/var/www
      - /var/www/vendor
    command: >
      sh -c "
        php artisan key:generate --force &&
        php artisan migrate --force &&
        php artisan db:seed --class=DatabaseSeeder --force &&
        php artisan sanzahra:migrate &&
        /usr/bin/supervisord -c /etc/supervisord.conf
      "

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_dev_pass
      MARIADB_DATABASE: hawkins_cms
      MARIADB_USER: hawkins
      MARIADB_PASSWORD: hawkins_dev_pass
    ports:
      - "3307:3306"
    volumes:
      - mariadb_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: root_dev_pass
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_dev_data:
